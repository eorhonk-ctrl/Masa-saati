<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <!-- iOS 5 için tam ekran (Web App) modunu aktif eden kritik meta etiketleri -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masa Saati</title>
    <style>
        /* iOS 5 Safari uyumlu eski CSS standartları */
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: -webkit-box;
            -webkit-box-pack: center;
            -webkit-box-align: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
        }
        .clock {
            font-size: 110px;
            font-weight: bold;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .date {
            font-size: 28px;
            color: #888888;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="clock" class="clock">00:00:00</div>
        <div id="date" class="date">1 Ocak Cuma</div>
    </div>

    <script>
        function updateClock() {
            var now = new Date();
            
            // Saat, dakika ve saniyeyi al (iOS 5 uyumlu vanilla JS)
            var hours = now.getHours();
            var minutes = now.getMinutes();
            var seconds = now.getSeconds();
            
            // Başına sıfır ekleme (Padding)
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            
            // Ekrana bas
            document.getElementById('clock').innerHTML = hours + ':' + minutes + ':' + seconds;
            
            // Tarih formatı (Türkçe günler ve aylar)
            var days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            var months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            
            var dayName = days[now.getDay()];
            var monthName = months[now.getMonth()];
            var dateNum = now.getDate();
            
            document.getElementById('date').innerHTML = dateNum + ' ' + monthName + ' ' + dayName;
        }

        // Saati her saniye güncelle
        setInterval(updateClock, 1000);
        // İlk açılışta hemen çalıştır
        updateClock();
    </script>
</body>
</html>
