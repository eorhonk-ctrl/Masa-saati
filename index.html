<html>
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000000; 
            color: #ffffff; 
            font-family: 'Arial Black', Gadget, sans-serif; 
            text-align: center;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-box-pack: center;
            -webkit-box-align: center;
            height: 100vh;
        }
        .container {
            width: 100%;
            padding: 0 10px;
        }
        .clock-wrapper {
            display: -webkit-box;
            -webkit-box-pack: center;
            -webkit-box-align: center;
        }
        /* Fontu dikey eksende %140 yukarı doğru uzatıyoruz */
        #time { 
            font-size: 210px; 
            font-weight: bold; 
            line-height: 1;
            letter-spacing: -8px;
            -webkit-transform: scaleY(1.4);
            transform: scaleY(1.4);
            display: block;
        }
        /* Kırmızı saniye */
        #seconds {
            font-size: 70px;
            color: #ff3b30; 
            margin-left: 20px;
            font-weight: bold;
            -webkit-transform: scaleY(1.4);
            transform: scaleY(1.4);
            display: block;
        }
        /* Renklendirilmiş ve hafif esnetilmiş yeni tarih bloğu */
        #date { 
            font-size: 34px; 
            margin-top: 80px; 
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            -webkit-transform: scaleY(1.1);
            transform: scaleY(1.1);
        }
        /* Tarih sayısı ve ay adı için beyaz renk */
        .date-text {
            color: #ffffff;
        }
        /* Gün adı için canlı mavi renk */
        .day-text {
            color: #007aff;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock-wrapper">
            <span id="time">00:00</span>
            <span id="seconds">00</span>
        </div>
        <!-- Renkli dinamik tarih alanı -->
        <div id="date">Yükleniyor...</div>
    </div>
    <script>
        function clock() {
            var d = new Date();
            var h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
            if(h<10) h='0'+h; if(m<10) m='0'+m; if(s<10) s='0'+s;
            
            document.getElementById('time').innerHTML = h + ':' + m;
            document.getElementById('seconds').innerHTML = s;
            
            var days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            var months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            
            // Tarih metnini renkli parçalara ayırarak ekrana basıyoruz
            var dateHtml = '<span class="date-text">' + d.getDate() + ' ' + months[d.getMonth()] + '</span>' + 
                           '<span class="day-text">' + days[d.getDay()] + '</span>';
            
            document.getElementById('date').innerHTML = dateHtml;
        }
        setInterval(clock, 1000);
        clock();
    </script>
</body>
</html>
