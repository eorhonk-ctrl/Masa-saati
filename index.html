<html>
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000000; 
            color: #ffffff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-box-pack: center;
            -webkit-box-align: center;
            height: 100vh;
        }
        .container {
            width: 100%;
        }
        /* Saat ve Dakika alt alta gelerek ekranı dikeyde tamamen kaplar */
        .time-block {
            font-size: 320px; /* Fontu tam 320 piksele çıkardık! */
            font-weight: bold; 
            line-height: 0.85;
            letter-spacing: -10px;
            display: block;
        }
        /* Alttaki dakika bloğu */
        #minutes {
            color: #eeeeee;
        }
        #date { 
            font-size: 38px; 
            color: #555555; 
            margin-top: 50px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Saat ve Dakika Dev Boyutta Alt Alta -->
        <span id="hours" class="time-block">00</span>
        <span id="minutes" class="time-block">00</span>
        <div id="date">Yükleniyor...</div>
    </div>
    <script>
        function clock() {
            var d = new Date();
            var h = d.getHours(), m = d.getMinutes();
            if(h<10) h='0'+h; if(m<10) m='0'+m;
            
            document.getElementById('hours').innerHTML = h;
            document.getElementById('minutes').innerHTML = m;
            
            var days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            var months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            document.getElementById('date').innerHTML = d.getDate() + ' ' + months[d.getMonth()] + ' ' + days[d.getDay()];
        }
        setInterval(clock, 1000);
        clock();
    </script>
</body>
</html>
