<html>
<head>
    <!-- iOS 5 için Safari çubuklarını tamamen yok eden kritik kodlar -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000000; 
            color: #ffffff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            text-align: center;
            overflow: hidden;
            /* Ekranı dikeyde tam ortalamak için */
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-box-pack: center;
            -webkit-box-align: center;
            height: 100vh;
        }
        .container {
            width: 100%;
            padding: 10px;
        }
        /* iPad 1 (1024x768) ekranı için olabilecek en devasa font boyutu */
        #clock { 
            font-size: 160px; 
            font-weight: bold; 
            line-height: 1;
            letter-spacing: -4px;
        }
        #date { 
            font-size: 36px; 
            color: #777777; 
            margin-top: 30px; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="clock">00:00:00</div>
        <div id="date">Yükleniyor...</div>
    </div>
    <script>
        function clock() {
            var d = new Date();
            var h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
            if(h<10) h='0'+h; if(m<10) m='0'+m; if(s<10) s='0'+s;
            document.getElementById('clock').innerHTML = h+':'+m+':'+s;
            
            var days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            var months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            document.getElementById('date').innerHTML = d.getDate() + ' ' + months[d.getMonth()] + ' ' + days[d.getDay()];
        }
        setInterval(clock, 1000);
        clock();
    </script>
</body>
</html>
