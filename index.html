<html>
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000000; 
            color: #ffffff; 
            font-family: 'Arial Black', Gadget, sans-serif; 
            text-align: center;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-box-pack: center;
            -webkit-box-align: center;
            height: 100vh;
        }
        .container { width: 100%; padding: 0 10px; }
        .clock-wrapper { display: -webkit-box; -webkit-box-pack: center; -webkit-box-align: center; }
        
        .time-digits { 
            font-size: 210px; font-weight: bold; line-height: 1; letter-spacing: -8px;
            -webkit-transform: scaleY(1.4); transform: scaleY(1.4); display: block;
        }
        
        /* İki nokta: Boyutu küçültüldü, uzatması kaldırıldı ve araları açıldı */
        #separator {
            font-size: 110px;
            font-weight: bold;
            line-height: 1;
            margin: 0 35px; /* Saat ve dakika arasını belirgin şekilde açan boşluk */
            color: #ffffff;
            display: block;
        }
        
        #seconds {
            font-size: 70px; color: #ff3b30; margin-left: 25px; font-weight: bold;
            -webkit-transform: scaleY(1.4); transform: scaleY(1.4); display: block;
        }
        #date { 
            font-size: 34px; margin-top: 80px; text-transform: uppercase; letter-spacing: 3px;
            font-family: Arial, sans-serif; font-weight: bold;
            -webkit-transform: scaleY(1.1); transform: scaleY(1.1);
        }
        .date-text { color: #ffffff; }
        .day-text { color: #007aff; margin-left: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock-wrapper">
            <span id="hours" class="time-digits">00</span>
            <span id="separator">:</span>
            <span id="minutes" class="time-digits">00</span>
            <span id="seconds">00</span>
        </div>
        <div id="date">Yükleniyor...</div>
    </div>
    <script>
        function clock() {
            var d = new Date();
            var h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
            if(h<10) h='0'+h; if(m<10) m='0'+m; if(s<10) s='0'+s;
            
            document.getElementById('hours').innerHTML = h;
            document.getElementById('minutes').innerHTML = m;
            document.getElementById('seconds').innerHTML = s;
            
            var days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            var months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            
            document.getElementById('date').innerHTML = '<span class="date-text">' + d.getDate() + ' ' + months[d.getMonth()] + '</span><span class="day-text">' + days[d.getDay()] + '</span>';
        }
        setInterval(clock, 1000);
        clock();
    </script>
</body>
</html>
