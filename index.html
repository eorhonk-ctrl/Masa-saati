<html>
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000000; 
            color: #ffffff; 
            /* Dijital saat hissi veren, rakamları sabit genişlikte tutan Courier New fontu */
            font-family: 'Courier New', Courier, monospace; 
            text-align: center;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-box-pack: center;
            -webkit-box-align: center;
            height: 100vh;
        }
        .container {
            width: 100%;
            padding: 0 20px;
        }
        .clock-wrapper {
            display: -webkit-box;
            -webkit-box-pack: center;
            -webkit-box-align: baseline; /* Saniyenin alttan hizalanması için */
        }
        /* Yatayda yan yana durabilecek en devasa font boyutu */
        #time { 
            font-size: 195px; 
            font-weight: bold; 
            line-height: 1;
            letter-spacing: -6px;
        }
        /* Yanında daha küçük ve estetik duran saniye */
        #seconds {
            font-size: 65px;
            color: #ff3b30; /* Saniyeyi daha şık göstermek için tatlı bir dijital kırmızı tonu */
            margin-left: 15px;
            font-weight: bold;
        }
        #date { 
            font-size: 34px; 
            color: #555555; 
            margin-top: 40px; 
            text-transform: uppercase;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock-wrapper">
            <span id="time">00:00</span>
            <span id="seconds">00</span>
        </div>
        <div id="date">Yükleniyor...</div>
    </div>
    <script>
        function clock() {
            var d = new Date();
            var h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
            if(h<10) h='0'+h; if(m<10) m='0'+m; if(s<10) s='0'+s;
            
            // Saat ve Dakika yan yana ana blokta
            document.getElementById('time').innerHTML = h + ':' + m;
            // Saniye küçük blokta
            document.getElementById('seconds').innerHTML = s;
            
            var days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            var months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            document.getElementById('date').innerHTML = d.getDate() + ' ' + months[d.getMonth()] + ' ' + days[d.getDay()];
        }
        setInterval(clock, 1000);
        clock();
    </script>
</body>
</html>
