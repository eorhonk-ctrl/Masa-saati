<html>
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masa Saati ve Radyo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000000; 
            color: #ffffff; 
            font-family: 'Arial Black', Gadget, sans-serif; 
            text-align: center;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-box-pack: center;
            -webkit-box-align: center;
            height: 100vh;
        }
        .container { width: 100%; padding: 0 10px; }
        .clock-wrapper { display: -webkit-box; -webkit-box-pack: center; -webkit-box-align: center; }
        
        /* Devasa saat karakterleriniz */
        .time-digits { 
            font-size: 210px; font-weight: bold; line-height: 1; letter-spacing: -8px;
            -webkit-transform: scaleY(1.4); transform: scaleY(1.4); display: block;
        }
        
        /* Kibar iki nokta */
        #separator {
            font-size: 110px; font-weight: bold; line-height: 1;
            margin: 0 35px; color: #ffffff; display: block;
        }
        
        /* Kırmızı saniye */
        #seconds {
            font-size: 70px; color: #ff3b30; margin-left: 25px; font-weight: bold;
            -webkit-transform: scaleY(1.4); transform: scaleY(1.4); display: block;
        }
        
        /* Renkli tarih */
        #date { 
            font-size: 34px; margin-top: 70px; text-transform: uppercase; letter-spacing: 3px;
            font-family: Arial, sans-serif; font-weight: bold;
            -webkit-transform: scaleY(1.1); transform: scaleY(1.1);
        }
        .date-text { color: #ffffff; }
        .day-text { color: #007aff; margin-left: 15px; }

        /* YENİ TEK SATIR KAYDIRILABİLİR RADYOLAR */
        .radio-wrapper {
            margin-top: 80px;
            width: 100%;
            padding: 0 20px;
        }
        
        /* Sağa sola kaydırmayı sağlayan ana şerit haznesi */
        .scroll-container {
            width: 100%;
            overflow-x: scroll;
            white-space: nowrap;
            padding: 15px 0;
            /* iOS 5 için akıcı dokunmatik kaydırma desteği */
            -webkit-overflow-scrolling: touch; 
        }
        
        /* Eski iPad'in scrollbar'ını gizlemek için */
        .scroll-container::-webkit-scrollbar {
            display: none;
        }
        
        .r-btn {
            display: inline-block;
            background: #111111;
            color: #aaaaaa;
            border: 1px solid #333333;
            padding: 12px 24px;
            font-size: 15px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            margin: 0 6px;
            border-radius: 6px;
            cursor: pointer;
            -webkit-user-select: none;
        }
        
        /* Seçilen aktif radyonun alacağı şık mavi renk */
        .r-btn.active {
            background: #007aff;
            color: #ffffff;
            border-color: #007aff;
        }
        
        .stop-btn {
            color: #ff3b30;
            border-color: #441111;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- SAAT -->
        <div class="clock-wrapper">
            <span id="hours" class="time-digits">00</span>
            <span id="separator">:</span>
            <span id="minutes" class="time-digits">00</span>
            <span id="seconds">00</span>
        </div>
        
        <!-- TARİH -->
        <div id="date">Yükleniyor...</div>

        <!-- TEK SATIRDA PARMAKLA KAYDIRILAN RADYO ŞERİDİ -->
        <div class="radio-wrapper">
            <div class="scroll-container">
                <button id="btn-stop" class="r-btn stop-btn" onclick="stopRadio()">KAPAT</button>
                <button class="r-btn" onclick="playRadio(this, 'https://listen.powerapp.com.tr/powerfm/mpeg/icecast.audio')">POWER FM</button>
                <button class="r-btn" onclick="playRadio(this, 'https://listen.powerapp.com.tr/powerturk/mpeg/icecast.audio')">POWER TÜRK</button>
                <button class="r-btn" onclick="playRadio(this, 'https://listen.powerapp.com.tr/joyfm/mpeg/icecast.audio')">JOY FM</button>
                <button class="r-btn" onclick="playRadio(this, 'https://listen.powerapp.com.tr/joyturk/mpeg/icecast.audio')">JOY TÜRK</button>
                <button class="r-btn" onclick="playRadio(this, 'https://listen.powerapp.com.tr/joyturkakustik/mpeg/icecast.audio')">JOY TÜRK AKUSTİK</button>
                <button class="r-btn" onclick="playRadio(this, 'https://listen.powerapp.com.tr/powerchill/mpeg/icecast.audio')">POWER CHILL</button>
                <button class="r-btn" onclick="playRadio(this, 'https://listen.powerapp.com.tr/powerpop/mpeg/icecast.audio')">POWER POP</button>
                <button class="r-btn" onclick="playRadio(this, 'https://listen.powerapp.com.tr/powerlove/mpeg/icecast.audio')">POWER LOVE</button>
                <button class="r-btn" onclick="playRadio(this, 'https://listen.powerapp.com.tr/powergold/mpeg/icecast.audio')">POWER GOLD</button>
                <button class="r-btn" onclick="playRadio(this, 'https://listen.powerapp.com.tr/powersmoothjazz/mpeg/icecast.audio')">SMOOTH JAZZ</button>
                <button class="r-btn" onclick="playRadio(this, 'https://listen.powerapp.com.tr/powerdance/mpeg/icecast.audio')">POWER DANCE</button>
                <button class="r-btn" onclick="playRadio(this, 'https://listen.powerapp.com.tr/powersalsa/mpeg/icecast.audio')">POWER SALSA</button>
                <button class="r-btn" onclick="playRadio(this, 'https://listen.powerapp.com.tr/powerrock/mpeg/icecast.audio')">POWER ROCK</button>
            </div>
        </div>
    </div>

    <audio id="radioPlayer" preload="none"></audio>

    <script>
        // Saat Scripti
        function clock() {
            var d = new Date();
            var h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
            if(h<10) h='0'+h; if(m<10) m='0'+m; if(s<10) s='0'+s;
            document.getElementById('hours').innerHTML = h;
            document.getElementById('minutes').innerHTML = m;
            document.getElementById('seconds').innerHTML = s;
            
            var days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            var months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            document.getElementById('date').innerHTML = '<span class="date-text">' + d.getDate() + ' ' + months[d.getMonth()] + '</span><span class="day-text">' + days[d.getDay()] + '</span>';
        }
        setInterval(clock, 1000);
        clock();

        // Radyo Scripti
        var player = document.getElementById('radioPlayer');

        function playRadio(clickedButton, url) {
            // Önce tüm butonlardaki aktiflik (mavi renk) sınıfını temizle
            var buttons = document.getElementsByClassName('r-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].className = buttons[i].className.replace(' active', '');
            }
            
            // Sadece tıklanan butonu mavi yap
            clickedButton.className += ' active';
            
            player.src = url;
            player.play();
        }

        function stopRadio() {
            player.pause();
            player.src = "";
            
            // Kapatılınca tüm mavi ışıkları söndür
            var buttons = document.getElementsByClassName('r-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].className = buttons[i].className.replace(' active', '');
            }
        }
    </script>
</body>
</html>
