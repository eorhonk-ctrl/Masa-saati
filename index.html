<html>
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Saat</title>
    <style>
        body { background: black; color: white; font-family: Arial; text-align: center; padding-top: 150px; }
        #clock { font-size: 90px; font-weight: bold; }
        #date { font-size: 24px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="clock">00:00:00</div>
    <div id="date">Yükleniyor...</div>
    <script>
        function clock() {
            var d = new Date();
            var h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
            if(h<10) h='0'+h; if(m<10) m='0'+m; if(s<10) s='0'+s;
            document.getElementById('clock').innerHTML = h+':'+m+':'+s;
            
            var days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            document.getElementById('date').innerHTML = d.getDate() + ' ' + days[d.getDay()];
        }
        setInterval(clock, 1000);
        clock();
    </script>
</body>
</html>
